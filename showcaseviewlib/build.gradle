apply plugin: 'com.android.library'
apply plugin: 'maven-publish'

android {
    namespace = "smartdevelop.ir.eram.showcaseviewlib"
    compileSdk 35
    defaultConfig {
        minSdk 11
        targetSdk 35
        versionCode 11
        versionName "1.4.9"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    publishing {
        singleVariant("release")
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = "com.github.DEVMMZ"
                artifactId = "ShowCaseView"
                version = android.defaultConfig.versionName
                pom.withXml {
                    def root = asNode()
                    root.dependencies.each { deps ->
                        deps.dependency.findAll { dep ->
                            dep.groupId.text() == "org.jetbrains.kotlin"
                        }.each { kotlinDependency ->
                            deps.remove(kotlinDependency)
                        }
                    }
                }
            }
        }
    }
}

tasks.withType(org.gradle.api.publish.tasks.GenerateModuleMetadata).configureEach {
    enabled = false
}

task makeShowCaseView(type: Copy) {
    from('build/intermediates/bundles/release/')
    into('build/outputs/')
    include('classes.jar')
    rename ('classes.jar', 'showCaseViewLib.jar')
    into('release/') //you can change this directory where you want to copy your .jar
}
task clearJar(type: Delete) {
    delete 'build/libs/showCaseViewLib.jar'
}
makeShowCaseView.dependsOn(clearJar, build)

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}
